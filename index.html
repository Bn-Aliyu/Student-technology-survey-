<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Technology Survey</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYVz8GO2p2SRMl_CIP7jt8lBF6crH7OXgJtg&s");
            background-position:center;
            background-repeat: no-repeat;
            background-size: cover;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: green;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        p {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .survey-btn {
            display: inline-block;
            padding: 15px 35px;
            background: green;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .survey-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.3);
            background: #2a5298;
        }

        .footer {
            margin-top: 30px;
            color: #777;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 35px 25px;
            }

            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Student Technology Survey</h1>

        <p>
            Welcome! This survey aims to collect information about students'
            technology usage, learning tools, and study habits. Your responses
            will contribute to educational research and data analysis.
        </p>

        <a href="https://ee.kobotoolbox.org/x/0B8z2dpO" class="survey-btn">
            Take the Survey
        </a>

        <div class="footer">
            Thank you for your participation.
        </div>
    </div>

</body>
</html>
